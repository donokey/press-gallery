<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Press Gallery · 新闻精选</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Serif+SC:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="masthead">
    <div class="masthead__rule"></div>
    <h1 class="masthead__title">Press Gallery</h1>
    <p class="masthead__subtitle">新闻精选集</p>
    <div class="masthead__rule"></div>
  </header>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <div class="nav__pills" id="categoryPills"></div>
      <div class="nav__search">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索标题...">
      </div>
    </div>
  </nav>

  <section class="hero" id="heroZone"></section>

  <main class="grid" id="articleGrid"></main>

  <section class="no-results" id="noResults">
    <p class="no-results__icon">&#128270;</p>
    <p class="no-results__text">没有匹配的文章</p>
    <p class="no-results__hint">请尝试其他关键词或分类</p>
  </section>

  <footer class="footer">
    <div class="footer__rule"></div>
    <p>Press Gallery &copy; 2026</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
